syntax = "proto3";

package riad.sync;

option go_package = "github.com/anomalyco/riad_project/proto/sync";

// Representation of a Room
message Room {
    string id = 1;
    int32 number = 2;
    string type = 3;
    double price = 4;
    string description = 5;
    string equipments = 6;
    string status = 7;
    string cleaning_status = 8;
}

// Representation of a Reservation
message Reservation {
    string id = 1;
    string user_id = 2;
    string room_id = 3;
    string start_date = 4;
    string end_date = 5;
    double amount = 6;
    string status = 7;
}

// The event sent by the server to the client
message SyncEvent {
    enum EventType {
        ROOM_UPDATED = 0;
        RESERVATION_UPDATED = 1;
        ROOM_DELETED = 2;
        RESERVATION_DELETED = 3;
    }

    EventType type = 1;
    string entity_id = 2;

    oneof data {
        Room room = 3;
        Reservation reservation = 4;
    }

    int64 sequence_id = 5;
}

// Request to start the synchronization stream
message SyncRequest {
    string token = 1;
    int64 last_sequence_id = 2;
}

// --- Mutation messages ---

message GetChambresRequest {}
message GetChambresResponse {
    repeated Room rooms = 1;
}

message CreateReservationRequest {
    string user_id = 1;
    string room_id = 2;
    string start_date = 3;
    string end_date = 4;
    double amount = 5;
}
message CreateReservationResponse {
    string id = 1;
    string status = 2;
}

message UpdateCleaningStatusRequest {
    string room_id = 1;
    string cleaning_status = 2;
}
message UpdateCleaningStatusResponse {
    Room room = 1;
}

message CheckinRequest {
    string reservation_id = 1;
}
message CheckinResponse {
    Reservation reservation = 1;
}

message CheckoutRequest {
    string reservation_id = 1;
}
message CheckoutResponse {
    Reservation reservation = 1;
}

message SyncDataRequest {
    int64 last_sequence_id = 1;
}
message SyncDataResponse {
    repeated Room rooms = 1;
    repeated Reservation reservations = 2;
}

service SyncService {
    // Server-to-Client streaming RPC for real-time updates
    rpc StreamUpdates(SyncRequest) returns (stream SyncEvent);

    // Mutation RPCs (authenticated via gRPC metadata/interceptors)
    rpc GetChambres(GetChambresRequest) returns (GetChambresResponse);
    rpc CreateReservation(CreateReservationRequest) returns (CreateReservationResponse);
    rpc UpdateCleaningStatus(UpdateCleaningStatusRequest) returns (UpdateCleaningStatusResponse);
    rpc Checkin(CheckinRequest) returns (CheckinResponse);
    rpc Checkout(CheckoutRequest) returns (CheckoutResponse);
    rpc SyncData(SyncDataRequest) returns (SyncDataResponse);
}
