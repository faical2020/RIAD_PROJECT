syntax = "proto3";

package riad.sync;

option go_package = "github.com/anomalyco/riad_project/proto/sync";

// Representation of a Room update
message Room {
    string id = 1;
    int32 number = 2;
    string type = 3;
    double price = 4;
    string description = 5;
    string equipments = 6;
    string status = 7;
}

// Representation of a Reservation update
message Reservation {
    string id = 1;
    string user_id = 2;
    string room_id = 3;
    string start_date = 4;
    string end_date = 5;
    double amount = 6;
    string status = 7;
}

// The event sent by the server to the client
message SyncEvent {
    enum EventType {
        ROOM_UPDATED = 0;
        RESERVATION_UPDATED = 1;
        ROOM_DELETED = 2;
        RESERVATION_DELETED = 3;
    }
    
    EventType type = 1;
    string entity_id = 2;
    
    oneof data {
        Room room = 3;
        Reservation reservation = 4;
    }
    
    int64 sequence_id = 5;
}

// Request to start the synchronization stream
message SyncRequest {
    string token = 1;
    int64 last_sequence_id = 2;
}

service SyncService {
    // Server-to-Client streaming RPC for real-time updates
    rpc StreamUpdates(SyncRequest) returns (stream SyncEvent);
}
